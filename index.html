<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>天峰903 · 全景漫游</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-tap-highlight-color: transparent; }
  #canvas-wrap { position: fixed; inset: 0; cursor: grab; }
  #canvas-wrap.dragging { cursor: grabbing; }

  #fade { position: fixed; inset: 0; background: #000; pointer-events: none;
    opacity: 1; transition: opacity .5s ease; z-index: 30; }

  #scene-title { position: fixed; top: max(16px, env(safe-area-inset-top)); left: 16px;
    color: #fff; font-size: 18px; font-weight: 600; z-index: 10;
    text-shadow: 0 1px 6px rgba(0,0,0,.6); letter-spacing: 1px; }
  #scene-title small { display: block; font-size: 11px; font-weight: 400; opacity: .75; margin-top: 2px; }

  #toolbar { position: fixed; top: max(16px, env(safe-area-inset-top)); right: 16px;
    display: flex; gap: 8px; z-index: 10; }
  .tool-btn { width: 40px; height: 40px; border: none; border-radius: 50%;
    background: rgba(0,0,0,.45); color: #fff; font-size: 18px; cursor: pointer;
    backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center;
    transition: background .2s; }
  .tool-btn:hover { background: rgba(0,0,0,.7); }
  .tool-btn.active { background: rgba(255,255,255,.9); color: #000; }

  /* 缩略图栏 */
  #thumb-bar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    background: linear-gradient(transparent, rgba(0,0,0,.65));
    scrollbar-width: none; }
  #thumb-bar::-webkit-scrollbar { display: none; }
  .thumb { flex: 0 0 auto; width: 88px; cursor: pointer; text-align: center;
    opacity: .8; transition: opacity .2s, transform .2s; }
  .thumb:hover { opacity: 1; }
  .thumb img { width: 88px; height: 56px; object-fit: cover; border-radius: 8px;
    border: 2px solid transparent; display: block; }
  .thumb.active { opacity: 1; transform: translateY(-3px); }
  .thumb.active img { border-color: #fff; }
  .thumb span { color: #fff; font-size: 11px; line-height: 1.8; text-shadow: 0 1px 3px rgba(0,0,0,.8);
    white-space: nowrap; display: block; }

  /* 热点 */
  #hotspot-layer { position: fixed; inset: 0; pointer-events: none; z-index: 5; overflow: hidden; }
  .hotspot { position: absolute; transform: translate(-50%, -50%); pointer-events: auto;
    cursor: pointer; text-align: center; user-select: none; -webkit-user-select: none; }
  .hotspot .ring { width: 44px; height: 44px; margin: 0 auto; border-radius: 50%;
    background: rgba(255,255,255,.25); border: 2px solid rgba(255,255,255,.9);
    backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #fff; animation: pulse 2.2s ease-out infinite;
    transition: background .2s; }
  .hotspot:hover .ring { background: rgba(255,255,255,.5); }
  .hotspot .label { margin-top: 4px; color: #fff; font-size: 12px;
    text-shadow: 0 1px 4px rgba(0,0,0,.9); white-space: nowrap; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,255,255,.5); }
    70% { box-shadow: 0 0 0 14px rgba(255,255,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); } }

  /* 编辑面板 */
  #edit-panel { position: fixed; top: 70px; right: 16px; z-index: 20; width: 220px;
    background: rgba(20,20,20,.92); border-radius: 12px; padding: 14px; color: #eee;
    font-size: 13px; display: none; backdrop-filter: blur(10px); }
  #edit-panel.show { display: block; }
  #edit-panel h4 { font-size: 13px; margin-bottom: 8px; }
  #edit-panel p.tip { opacity: .65; font-size: 12px; line-height: 1.5; margin-bottom: 8px; }
  #edit-panel select, #edit-panel button { width: 100%; margin-top: 6px; padding: 7px;
    border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: #eee;
    font-size: 13px; cursor: pointer; }
  #edit-panel button.primary { background: #fff; color: #000; border-color: #fff; font-weight: 600; }
  #edit-panel .row { display: flex; gap: 6px; }
  #edit-panel .row button { flex: 1; }

  /* 批注标记 */
  #ann-layer { position: fixed; inset: 0; pointer-events: none; z-index: 5; overflow: hidden; }
  .ann-marker { position: absolute; transform: translate(-50%, -50%); pointer-events: auto;
    cursor: pointer; user-select: none; -webkit-user-select: none; }
  .ann-marker .dot { width: 26px; height: 26px; border-radius: 50%; background: #ff8d1c;
    color: #fff; font-size: 13px; font-weight: 700; display: flex; align-items: center;
    justify-content: center; border: 2px solid #fff; box-shadow: 0 1px 6px rgba(0,0,0,.4); }
  .ann-marker .bubble { display: none; position: absolute; bottom: 34px; left: 50%;
    transform: translateX(-50%); background: rgba(20,20,20,.92); color: #eee;
    padding: 8px 12px; border-radius: 10px; font-size: 13px; line-height: 1.5;
    width: max-content; max-width: 240px; backdrop-filter: blur(8px); }
  .ann-marker:hover .bubble, .ann-marker.open .bubble { display: block; }
  body.ann-adding #canvas-wrap { cursor: crosshair; }

  /* 右侧抽屉（批注列表 / AI 改图） */
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 300px; max-width: 85vw;
    background: rgba(18,18,18,.94); backdrop-filter: blur(14px); z-index: 25;
    transform: translateX(100%); transition: transform .3s ease; color: #eee;
    display: flex; flex-direction: column;
    padding: max(16px, env(safe-area-inset-top)) 0 env(safe-area-inset-bottom); }
  .drawer.show { transform: translateX(0); }
  .drawer header { display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px 12px; font-size: 15px; font-weight: 600;
    border-bottom: 1px solid rgba(255,255,255,.1); }
  .drawer header .close { background: none; border: none; color: #999; font-size: 20px;
    cursor: pointer; padding: 4px; }
  .drawer .body { flex: 1; overflow-y: auto; padding: 12px 16px; font-size: 13px; }

  .ann-group-title { color: #888; font-size: 12px; margin: 10px 0 6px; }
  .ann-item { background: rgba(255,255,255,.06); border-radius: 10px; padding: 10px 12px;
    margin-bottom: 8px; cursor: pointer; display: flex; gap: 8px; align-items: flex-start;
    transition: background .2s; }
  .ann-item:hover { background: rgba(255,255,255,.12); }
  .ann-item .num { flex: 0 0 auto; width: 20px; height: 20px; border-radius: 50%;
    background: #ff8d1c; color: #fff; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; margin-top: 1px; }
  .ann-item .txt { flex: 1; line-height: 1.5; word-break: break-all; }
  .ann-item .del { background: none; border: none; color: #777; cursor: pointer;
    font-size: 14px; padding: 2px; }
  .ann-item .del:hover { color: #f66; }
  .ann-empty { color: #777; text-align: center; padding: 30px 0; }

  /* AI 改图面板 */
  #ai-cap-preview { width: 100%; border-radius: 10px; display: block; margin: 8px 0;
    outline: 1px solid rgba(255,255,255,.15); }
  #ai-panel .face-row { display: flex; align-items: center; justify-content: space-between;
    margin-top: 4px; }
  #ai-panel .face-row b { font-size: 14px; }
  #ai-panel button, #ai-panel textarea, #ai-panel select { width: 100%; margin-top: 8px;
    padding: 9px; border-radius: 10px; border: 1px solid #444; background: #2a2a2a;
    color: #eee; font-size: 13px; font-family: inherit; }
  #ai-panel textarea { resize: vertical; min-height: 64px; }
  #ai-panel button { cursor: pointer; }
  #ai-panel button.primary { background: #ff8d1c; border-color: #ff8d1c; color: #fff;
    font-weight: 600; }
  #ai-panel button.primary:disabled { opacity: .5; cursor: default; }
  #ai-panel button.small { width: auto; padding: 5px 10px; margin: 0; font-size: 12px; }
  #ai-status { margin-top: 8px; font-size: 12px; color: #ff8d1c; min-height: 18px; }
  #ai-versions .ver { display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    border-radius: 8px; background: rgba(255,255,255,.06); margin-top: 6px; cursor: pointer; }
  #ai-versions .ver.active { outline: 2px solid #ff8d1c; }
  #ai-versions .ver .p { flex: 1; font-size: 12px; line-height: 1.4; word-break: break-all; }
  #ai-versions .ver .t { color: #888; font-size: 11px; }

  /* 批注输入弹窗 */
  #ann-modal { position: fixed; inset: 0; z-index: 35; display: none;
    align-items: center; justify-content: center; background: rgba(0,0,0,.5); }
  #ann-modal.show { display: flex; }
  #ann-modal .card { width: 320px; max-width: 88vw; background: rgba(24,24,24,.97);
    border-radius: 14px; padding: 18px; color: #eee; }
  #ann-modal h4 { font-size: 15px; margin-bottom: 10px; }
  #ann-modal textarea { width: 100%; min-height: 80px; padding: 10px; border-radius: 10px;
    border: 1px solid #444; background: #2a2a2a; color: #eee; font-size: 14px;
    font-family: inherit; resize: vertical; }
  #ann-modal .row { display: flex; gap: 8px; margin-top: 12px; }
  #ann-modal .row button { flex: 1; padding: 9px; border-radius: 10px; border: none;
    font-size: 14px; cursor: pointer; }
  #ann-modal .ok { background: #ff8d1c; color: #fff; font-weight: 600; }
  #ann-modal .cancel { background: #333; color: #ccc; }

  #toast { position: fixed; left: 50%; top: 20%; transform: translateX(-50%);
    background: rgba(0,0,0,.8); color: #fff; padding: 10px 18px; border-radius: 20px;
    font-size: 14px; z-index: 40; opacity: 0; transition: opacity .3s; pointer-events: none; }
  #toast.show { opacity: 1; }

  #loading { position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%);
    color: rgba(255,255,255,.85); font-size: 14px; z-index: 31; letter-spacing: 2px;
    display: none; }
  #loading.show { display: block; }
</style>
</head>
<body>
<div id="canvas-wrap"></div>
<div id="hotspot-layer"></div>
<div id="ann-layer"></div>
<div id="fade"></div>
<div id="loading">加载中…</div>

<div id="scene-title"><span id="scene-name"></span><small>天峰903 · 全景漫游</small></div>

<div id="toolbar">
  <button class="tool-btn" id="btn-gyro" title="陀螺仪" style="display:none">📱</button>
  <button class="tool-btn" id="btn-edit" title="编辑热点" style="display:none">✏️</button>
  <button class="tool-btn" id="btn-ai" title="AI 改图" style="display:none">🎨</button>
  <button class="tool-btn" id="btn-ann-add" title="添加批注" style="display:none">✍️</button>
  <button class="tool-btn" id="btn-ann-list" title="批注列表">💬</button>
  <button class="tool-btn" id="btn-fs" title="全屏">⛶</button>
</div>

<div class="drawer" id="ann-drawer">
  <header>批注<button class="close" data-close="ann-drawer">✕</button></header>
  <div class="body" id="ann-list"></div>
</div>

<div class="drawer" id="ai-panel">
  <header>AI 改图<button class="close" data-close="ai-panel">✕</button></header>
  <div class="body">
    <div class="face-row">
      <span style="font-size:12px;color:#aaa">编辑范围 = 当前视野向外扩大一圈</span>
      <button class="small" id="ai-cap-refresh">重新捕捉</button>
    </div>
    <img id="ai-cap-preview" alt="">
    <div class="face-row">
      <span style="font-size:12px;color:#aaa">捕捉视野 <b id="ai-fov-val">105</b>°</span>
      <input type="range" id="ai-fov" min="90" max="120" value="105" step="5" style="width:55%">
    </div>
    <select id="ai-model"></select>
    <div class="face-row" style="margin-top:8px">
      <span style="font-size:12px;color:#aaa">参考图（可选，可直接 Ctrl+V 粘贴）</span>
      <span>
        <button class="small" id="ai-ref-btn">选择</button>
        <button class="small" id="ai-ref-clear" style="display:none">移除</button>
      </span>
    </div>
    <input type="file" id="ai-ref-file" accept="image/*" style="display:none">
    <img id="ai-ref-preview" style="display:none;width:100%;border-radius:10px;margin-top:6px" alt="">
    <div id="ai-ref-tip" style="display:none;font-size:12px;color:#888;margin-top:6px;line-height:1.5">
      提示词里用「图1」指当前画面、「图2」指参考图，例如：把图2的沙发放到图1的客厅里</div>
    <textarea id="ai-prompt" placeholder="描述修改，例如：把沙发换成米色布艺沙发；地毯改成纯色浅灰"></textarea>
    <button class="primary" id="ai-generate">生成（约 1 分钟）</button>
    <div id="ai-status"></div>
    <div id="ai-versions"></div>
  </div>
</div>

<div id="ann-modal">
  <div class="card">
    <h4>添加批注</h4>
    <textarea id="ann-text" placeholder="写下你的想法，例如：这面墙想做成岩板背景"></textarea>
    <div class="row">
      <button class="cancel" id="ann-cancel">取消</button>
      <button class="ok" id="ann-save">保存</button>
    </div>
  </div>
</div>

<div id="edit-panel">
  <h4>热点编辑模式</h4>
  <p class="tip">点击画面中的地面位置放置热点，然后选择要跳转的目标场景。</p>
  <select id="edit-target"></select>
  <button class="primary" id="edit-add" disabled>放置热点（先点击画面）</button>
  <div class="row">
    <button id="edit-undo">撤销</button>
    <button id="edit-clear">清空本场景</button>
  </div>
  <button id="edit-export">导出 hotspots.json</button>
</div>

<div id="thumb-bar"></div>
<div id="toast"></div>

<script type="module">
import * as THREE from './vendor/three.module.min.js';

/* ---------- 基础状态 ---------- */
const wrap = document.getElementById('canvas-wrap');
const fadeEl = document.getElementById('fade');
const loadingEl = document.getElementById('loading');
const hotspotLayer = document.getElementById('hotspot-layer');

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 100);

let yaw = 0, pitch = 0;           // 弧度；yaw=0 朝向 f 面(-z)
let velYaw = 0, velPitch = 0;     // 惯性
let fov = 75;
const PITCH_LIMIT = Math.PI / 2 - 0.05;

let scenes = [];                  // scenes.json 里的场景列表
let hotspots = {};                // folder -> [{yaw,pitch,target}]
let annotations = {};             // folder -> [{yaw,pitch,text,time}]
let edits = {};                   // folder -> face -> {active, versions:[{file,prompt,time}]}
let current = null;               // 当前场景对象
let currentGroup = null;          // 当前立方体 Group
let viewMemory = {};              // folder -> {yaw,pitch} 记住视角
let gyroOn = false;
let serverMode = false;           // 本地服务器可用（批注可写）
let aiMode = false;               // AI 改图可用

const texLoader = new THREE.TextureLoader();
const isTouch = 'ontouchstart' in window;

/* ---------- 立方体构建（krpano 六面 → 内表面平面） ---------- */
const FACE_DEFS = [
  { face: 'f', pos: [0, 0, -1], rot: [0, 0, 0] },
  { face: 'b', pos: [0, 0, 1],  rot: [0, Math.PI, 0] },
  { face: 'l', pos: [-1, 0, 0], rot: [0, Math.PI / 2, 0] },
  { face: 'r', pos: [1, 0, 0],  rot: [0, -Math.PI / 2, 0] },
  { face: 'u', pos: [0, 1, 0],  rot: [Math.PI / 2, 0, 0] },
  { face: 'd', pos: [0, -1, 0], rot: [-Math.PI / 2, 0, 0] },
];
const SIZE = 20; // 立方体半边长

function encodePath(p) {
  return p.split('/').map(encodeURIComponent).join('/');
}

function faceUrl(folder, face) {
  const entry = edits[folder]?.[face];
  if (entry?.active) return encodePath(entry.active) + '?v=' + entry.versions.length;
  return 'assets/scenes/' + encodeURIComponent(folder) + '/' + face + '.jpg';
}

function loadTexture(url) {
  return new Promise((resolve, reject) => {
    texLoader.load(url, t => { t.colorSpace = THREE.SRGBColorSpace; resolve(t); }, undefined, reject);
  });
}

async function buildCube(folder) {
  const textures = await Promise.all(FACE_DEFS.map(fd => loadTexture(faceUrl(folder, fd.face))));
  const group = new THREE.Group();
  FACE_DEFS.forEach((fd, i) => {
    const geo = new THREE.PlaneGeometry(SIZE * 2, SIZE * 2);
    const mat = new THREE.MeshBasicMaterial({ map: textures[i], transparent: true, opacity: 0, depthWrite: false });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(fd.pos[0] * SIZE, fd.pos[1] * SIZE, fd.pos[2] * SIZE);
    mesh.rotation.set(fd.rot[0], fd.rot[1], fd.rot[2]);
    group.add(mesh);
  });
  return group;
}

function disposeGroup(g) {
  g.children.forEach(m => { m.material.map?.dispose(); m.material.dispose(); m.geometry.dispose(); });
  scene.remove(g);
}

/* ---------- 场景切换 ---------- */
let switching = false;
async function gotoScene(folder, opts = {}) {
  if (switching || (current && current.folder === folder)) return;
  const target = scenes.find(s => s.folder === folder);
  if (!target) return;
  switching = true;
  loadingEl.classList.add('show');

  // 记住旧场景视角
  if (current) viewMemory[current.folder] = { yaw, pitch };

  let newGroup;
  try {
    newGroup = await buildCube(folder);
  } catch (e) {
    loadingEl.classList.remove('show');
    switching = false;
    toast('场景加载失败');
    return;
  }

  const old = currentGroup;
  current = target;
  currentGroup = newGroup;
  scene.add(newGroup);

  // 恢复视角
  if (opts.yaw !== undefined) { yaw = opts.yaw; pitch = opts.pitch ?? 0; }
  else if (viewMemory[folder]) { yaw = viewMemory[folder].yaw; pitch = viewMemory[folder].pitch; }
  else { yaw = 0; pitch = 0; }
  velYaw = velPitch = 0;

  document.getElementById('scene-name').textContent = target.name;
  document.querySelectorAll('.thumb').forEach(el =>
    el.classList.toggle('active', el.dataset.folder === folder));
  document.querySelector('.thumb.active')?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  renderHotspots();
  renderAnnMarkers();
  loadingEl.classList.remove('show');

  // 淡入新场景
  await crossFade(newGroup, old);
  switching = false;
  preloadNeighbors();
}

function crossFade(newGroup, oldGroup) {
  return new Promise(resolve => {
    const t0 = performance.now(), D = 500;
    function step(t) {
      const k = Math.min((t - t0) / D, 1);
      newGroup.children.forEach(m => m.material.opacity = k);
      if (oldGroup) oldGroup.children.forEach(m => m.material.opacity = 1 - k);
      if (k < 1) requestAnimationFrame(step);
      else {
        newGroup.children.forEach(m => { m.material.transparent = false; m.material.depthWrite = true; });
        if (oldGroup) disposeGroup(oldGroup);
        resolve();
      }
    }
    requestAnimationFrame(step);
  });
}

function preloadNeighbors() {
  const idx = scenes.indexOf(current);
  [idx - 1, idx + 1].forEach(i => {
    if (i < 0 || i >= scenes.length) return;
    FACE_DEFS.forEach(fd => { const img = new Image(); img.src = faceUrl(scenes[i].folder, fd.face); });
  });
}

/* ---------- 视角控制 ---------- */
function updateCamera() {
  const cp = Math.cos(pitch);
  camera.lookAt(Math.sin(yaw) * cp, Math.sin(pitch), -Math.cos(yaw) * cp);
  camera.fov = fov;
  camera.updateProjectionMatrix();
}

// 拖拽（鼠标 + 单指）
let dragging = false, lastX = 0, lastY = 0, moved = 0;
let pinchDist = 0;

wrap.addEventListener('pointerdown', e => {
  if (e.isPrimary === false) return;
  dragging = true; moved = 0; lastX = e.clientX; lastY = e.clientY;
  velYaw = velPitch = 0;
  wrap.classList.add('dragging');
});
addEventListener('pointermove', e => {
  if (!dragging || e.isPrimary === false) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  moved += Math.abs(dx) + Math.abs(dy);
  const speed = (fov / 75) * 0.0032;
  yaw -= dx * speed;
  pitch += dy * speed;
  pitch = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT, pitch));
  velYaw = -dx * speed; velPitch = dy * speed;
});
addEventListener('pointerup', e => {
  if (dragging && moved < 6) handleTap(e.clientX, e.clientY);
  dragging = false;
  wrap.classList.remove('dragging');
});

// 滚轮 / 双指缩放
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  fov = Math.max(35, Math.min(100, fov + e.deltaY * 0.05));
}, { passive: false });

wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    pinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                           e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });
wrap.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                         e.touches[0].clientY - e.touches[1].clientY);
    fov = Math.max(35, Math.min(100, fov * (pinchDist / d)));
    pinchDist = d;
  }
}, { passive: true });

// 键盘切换场景
addEventListener('keydown', e => {
  const idx = scenes.indexOf(current);

/* ---------- 陀螺仪 ---------- */
const gyroQuat = new THREE.Quaternion();
const screenTransform = new THREE.Quaternion();
const worldTransform = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)); // 相机看向 -z
const euler = new THREE.Euler();
let gyroData = null;
let gyroYawOffset = 0;

function onGyro(e) {
  if (e.alpha == null) return;
  gyroData = e;
}

function applyGyro() {
  if (!gyroData) return;
  const alpha = THREE.MathUtils.degToRad(gyroData.alpha);
  const beta = THREE.MathUtils.degToRad(gyroData.beta);
  const gamma = THREE.MathUtils.degToRad(gyroData.gamma);
  const orient = THREE.MathUtils.degToRad((screen.orientation?.angle) || 0);

  euler.set(beta, alpha, -gamma, 'YXZ');
  gyroQuat.setFromEuler(euler);
  gyroQuat.multiply(worldTransform);
  screenTransform.setFromAxisAngle(new THREE.Vector3(0, 0, 1), -orient);
  gyroQuat.multiply(screenTransform);

  // 加上手动 yaw 偏移，允许拖拽修正朝向
  const offsetQ = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), gyroYawOffset);
  camera.quaternion.copy(offsetQ.multiply(gyroQuat));
  camera.fov = fov;
  camera.updateProjectionMatrix();
}

const btnGyro = document.getElementById('btn-gyro');
if (isTouch && 'DeviceOrientationEvent' in window) btnGyro.style.display = 'flex';
btnGyro.addEventListener('click', async () => {
  if (!gyroOn) {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const p = await DeviceOrientationEvent.requestPermission();
        if (p !== 'granted') { toast('未授权陀螺仪'); return; }
      } catch { toast('陀螺仪授权失败'); return; }
    }
    addEventListener('deviceorientation', onGyro);
    // 以当前视角为基准
    gyroYawOffset = yaw;
    gyroOn = true;
    btnGyro.classList.add('active');
    toast('陀螺仪已开启');
  } else {
    removeEventListener('deviceorientation', onGyro);
    gyroOn = false; gyroData = null;
    btnGyro.classList.remove('active');
    // 把当前朝向同步回 yaw/pitch
    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    yaw = Math.atan2(dir.x, -dir.z);
    pitch = Math.asin(Math.max(-1, Math.min(1, dir.y)));
    toast('陀螺仪已关闭');
  }
});

function yawPitchToVec(y, p) {
  const cp = Math.cos(p);
  return new THREE.Vector3(Math.sin(y) * cp, Math.sin(p), -Math.cos(y) * cp);
}

    hotspotLayer.appendChild(el);

}

const projVec = new THREE.Vector3();
function updateHotspotPositions() {
  for (const el of hotspotLayer.children) {
    const h = el._data;
    projVec.copy(yawPitchToVec(h.yaw, h.pitch)).multiplyScalar(SIZE);
    projVec.project(camera);
    const behind = projVec.z > 1;
    if (behind || projVec.x < -1.15 || projVec.x > 1.15 || projVec.y < -1.15 || projVec.y > 1.15) {
      el.style.display = 'none';
    } else {
      el.style.display = '';
      el.style.left = (projVec.x * 0.5 + 0.5) * innerWidth + 'px';
      el.style.top = (-projVec.y * 0.5 + 0.5) * innerHeight + 'px';
    }
  }
}

function screenToYawPitch(x, y) {
  const ndc = new THREE.Vector2((x / innerWidth) * 2 - 1, -(y / innerHeight) * 2 + 1);
  const ray = new THREE.Raycaster();
  ray.setFromCamera(ndc, camera);
  const dir = ray.ray.direction;
  return {
    yaw: Math.atan2(dir.x, -dir.z),
    pitch: Math.asin(Math.max(-1, Math.min(1, dir.y))),
  };
}

/* ---------- AI 改图（视野捕捉 + 重投影回立方体面） ---------- */
let aiBusy = false;
let pendingCap = null;   // {image, basis:{x,y,f}, tanHalf}

// 捕捉比当前视野更大一圈的画面送给 AI。
// 用 WebGLRenderTarget 离屏渲染（同一 GL 上下文，不动主 canvas），读回像素拼成图片。
const CAP_SIZE = 1536;
const capCam = new THREE.PerspectiveCamera(105, 1, 0.1, 100);
const capTarget = new THREE.WebGLRenderTarget(CAP_SIZE, CAP_SIZE, {
  colorSpace: THREE.SRGBColorSpace,
  samples: 4,
});

function captureView() {
  const fovDeg = parseInt(document.getElementById('ai-fov').value, 10);
  capCam.fov = fovDeg;
  capCam.updateProjectionMatrix();
  capCam.quaternion.copy(camera.quaternion);

  renderer.setRenderTarget(capTarget);
  renderer.render(scene, capCam);
  const buf = new Uint8Array(CAP_SIZE * CAP_SIZE * 4);
  renderer.readRenderTargetPixels(capTarget, 0, 0, CAP_SIZE, CAP_SIZE, buf);
  renderer.setRenderTarget(null);

  // GL 读回是自下而上的，翻转行序
  const c = document.createElement('canvas');
  c.width = c.height = CAP_SIZE;
  const ctx = c.getContext('2d');
  const id = ctx.createImageData(CAP_SIZE, CAP_SIZE);
  const row = CAP_SIZE * 4;
  for (let y = 0; y < CAP_SIZE; y++)
    id.data.set(buf.subarray((CAP_SIZE - 1 - y) * row, (CAP_SIZE - y) * row), y * row);
  ctx.putImageData(id, 0, 0);
  const image = c.toDataURL('image/jpeg', 0.92);

  const q = capCam.quaternion;
  const v = axis => axis.applyQuaternion(q);
  const bx = v(new THREE.Vector3(1, 0, 0));
  const by = v(new THREE.Vector3(0, 1, 0));
  const bf = v(new THREE.Vector3(0, 0, -1));
  pendingCap = {
    image,
    basis: { x: [bx.x, bx.y, bx.z], y: [by.x, by.y, by.z], f: [bf.x, bf.y, bf.z] },
    tanHalf: Math.tan(fovDeg * Math.PI / 360),
  };
  document.getElementById('ai-cap-preview').src = pendingCap.image;
}

// 立方体面上像素 (u,v∈[-1,1]，v 上为正) 对应的世界方向，与 FACE_DEFS 的平面布置一致
function faceDirComp(face, u, v, out) {
  switch (face) {
    case 'f': out[0] = u; out[1] = v; out[2] = -1; break;
    case 'b': out[0] = -u; out[1] = v; out[2] = 1; break;
    case 'l': out[0] = -1; out[1] = v; out[2] = -u; break;
    case 'r': out[0] = 1; out[1] = v; out[2] = u; break;
    case 'u': out[0] = u; out[1] = 1; out[2] = v; break;
    case 'd': out[0] = u; out[1] = -1; out[2] = -v; break;
  }
}

function loadImageEl(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

// 把编辑结果按捕捉时的相机参数投影回被覆盖的面，边缘羽化融合
async function reprojectToFaces(cap, editedImg) {
  const W = editedImg.naturalWidth, H = editedImg.naturalHeight;
  const ec = document.createElement('canvas');
  ec.width = W; ec.height = H;
  const ectx = ec.getContext('2d');
  ectx.drawImage(editedImg, 0, 0);
  const ed = ectx.getImageData(0, 0, W, H).data;

  const bx = cap.basis.x, by = cap.basis.y, bf = cap.basis.f;
  const th = cap.tanHalf, FEATHER = 0.15, N = 1500;
  const d = [0, 0, 0];
  const result = {};

  for (const fd of FACE_DEFS) {
    const face = fd.face;
    // 粗测：9x9 网格有没有任何方向落进捕捉视锥
    let hit = false;
    for (let gy = 0; gy <= 8 && !hit; gy++) {
      for (let gx = 0; gx <= 8; gx++) {
        faceDirComp(face, gx / 4 - 1, 1 - gy / 4, d);
        const dz = d[0] * bf[0] + d[1] * bf[1] + d[2] * bf[2];
        if (dz <= 0) continue;
        const nx = (d[0] * bx[0] + d[1] * bx[1] + d[2] * bx[2]) / dz / th;
        const ny = (d[0] * by[0] + d[1] * by[1] + d[2] * by[2]) / dz / th;
        if (Math.abs(nx) < 1 && Math.abs(ny) < 1) { hit = true; break; }
      }
    }
    if (!hit) continue;

    const baseImg = await loadImageEl(faceUrl(current.folder, face));
    const c = document.createElement('canvas');
    c.width = c.height = N;
    const ctx = c.getContext('2d');
    ctx.drawImage(baseImg, 0, 0, N, N);
    const id = ctx.getImageData(0, 0, N, N);
    const px = id.data;
    let touched = false;

    for (let j = 0; j < N; j++) {
      const v = 1 - (j + 0.5) / (N / 2);
      for (let i = 0; i < N; i++) {
        const u = (i + 0.5) / (N / 2) - 1;
        faceDirComp(face, u, v, d);
        const dz = d[0] * bf[0] + d[1] * bf[1] + d[2] * bf[2];
        if (dz <= 0) continue;
        const nx = (d[0] * bx[0] + d[1] * bx[1] + d[2] * bx[2]) / dz / th;
        const ny = (d[0] * by[0] + d[1] * by[1] + d[2] * by[2]) / dz / th;
        const t = Math.max(Math.abs(nx), Math.abs(ny));
        if (t >= 1) continue;
        let a = (1 - t) / FEATHER;
        if (a > 1) a = 1;
        a = a * a * (3 - 2 * a);  // smoothstep

        // 双线性采样编辑结果
        const sx = Math.min(Math.max((nx * 0.5 + 0.5) * W - 0.5, 0), W - 1.001);
        const sy = Math.min(Math.max((0.5 - ny * 0.5) * H - 0.5, 0), H - 1.001);
        const x0 = sx | 0, y0 = sy | 0, fx = sx - x0, fy = sy - y0;
        const o00 = (y0 * W + x0) * 4, o10 = o00 + 4, o01 = o00 + W * 4, o11 = o01 + 4;
        const w00 = (1 - fx) * (1 - fy), w10 = fx * (1 - fy), w01 = (1 - fx) * fy, w11 = fx * fy;
        const o = (j * N + i) * 4;
        for (let k = 0; k < 3; k++) {
          const s = ed[o00 + k] * w00 + ed[o10 + k] * w10 + ed[o01 + k] * w01 + ed[o11 + k] * w11;
          px[o + k] = px[o + k] * (1 - a) + s * a;
        }
        touched = true;
      }
    }
    if (touched) {
      ctx.putImageData(id, 0, 0);
      result[face] = c;
    }
  }
  return result;
}

function refreshAiPanel() {
  if (!current) return;
  captureView();
  renderAiVersions();
}

// 一次视野编辑生成一组（op）面贴图，版本按组切换
function sceneOps() {
  const byOp = new Map();
  Object.values(edits[current.folder] || {}).forEach(entry => {
    entry.versions.forEach(v => {
      const key = v.op || v.file;  // 旧版单面记录没有 op，用文件路径当组键
      if (!byOp.has(key)) byOp.set(key, { ...v, op: key, files: [], activeCount: 0 });
      const op = byOp.get(key);
      op.files.push(v.file);
      if (entry.active === v.file) op.activeCount++;
    });
  });
  return [...byOp.values()].sort((a, b) => (a.time || '').localeCompare(b.time || ''));
}

function renderAiVersions() {
  const box = document.getElementById('ai-versions');
  box.innerHTML = '';
  const ops = sceneOps();
  if (!ops.length) return;
  const anyActive = ops.some(o => o.activeCount > 0);

  const mk = (label, timeText, isActive, onClick) => {
    const el = document.createElement('div');
    el.className = 'ver' + (isActive ? ' active' : '');
    el.innerHTML = '<span class="p"></span><span class="t"></span>';
    el.querySelector('.p').textContent = label;
    el.querySelector('.t').textContent = timeText || '';
    el.addEventListener('click', onClick);
    box.appendChild(el);
  };
  mk('📷 全部恢复原图', '', !anyActive, async () => {
    for (const o of ops) if (o.activeCount) await toggleOp(o.op, false, true);
    await refreshEditsAndFaces();
  });
  ops.forEach(o => mk(o.prompt,
    (o.time || '') + (o.model ? ' · ' + o.model.replace('-image', '') : ''),
    o.activeCount > 0,
    () => toggleOp(o.op, !(o.activeCount > 0))));
}

async function toggleOp(op, on, skipRefresh) {
  try {
    const r = await fetch('/api/edits/active', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ folder: current.folder, op, on }),
    });
    if (!r.ok) throw 0;
    if (!skipRefresh) await refreshEditsAndFaces();
  } catch { toast('切换版本失败'); }
}

async function refreshEditsAndFaces() {
  edits = await (await fetch('assets/edits.json?t=' + Date.now())).json();
  for (const fd of FACE_DEFS) await reloadFace(current.folder, fd.face);
  renderAiVersions();
  captureView();
}

async function reloadFace(folder, face) {
  if (!current || current.folder !== folder || !currentGroup) return;
  const i = FACE_DEFS.findIndex(fd => fd.face === face);
  const tex = await loadTexture(faceUrl(folder, face));
  const mat = currentGroup.children[i].material;
  mat.map?.dispose();
  mat.map = tex;
  mat.needsUpdate = true;
}

/* 参考图：文件选择 / Ctrl+V 粘贴，统一压到 1500px 内的 jpeg data URL */
let aiRef = null;

function setRefImage(dataUrl) {
  aiRef = dataUrl;
  const preview = document.getElementById('ai-ref-preview');
  const hasRef = !!dataUrl;
  preview.src = dataUrl || '';
  preview.style.display = hasRef ? 'block' : 'none';
  document.getElementById('ai-ref-tip').style.display = hasRef ? 'block' : 'none';
  document.getElementById('ai-ref-clear').style.display = hasRef ? '' : 'none';
}

function loadRefFromBlob(blob) {
  const img = new Image();
  img.onload = () => {
    const MAX = 1500;
    const k = Math.min(1, MAX / Math.max(img.width, img.height));
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(img.width * k);
    canvas.height = Math.round(img.height * k);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    setRefImage(canvas.toDataURL('image/jpeg', 0.9));
    URL.revokeObjectURL(img.src);
    toast('参考图已添加');
  };
  img.src = URL.createObjectURL(blob);
}

document.getElementById('ai-ref-btn').addEventListener('click', () =>
  document.getElementById('ai-ref-file').click());
document.getElementById('ai-ref-file').addEventListener('change', e => {
  if (e.target.files[0]) loadRefFromBlob(e.target.files[0]);
  e.target.value = '';
});
document.getElementById('ai-ref-clear').addEventListener('click', () => setRefImage(null));

addEventListener('paste', e => {
  if (!document.getElementById('ai-panel').classList.contains('show')) return;
  for (const item of e.clipboardData?.items || []) {

});

  const prompt = document.getElementById('ai-prompt').value.trim();
  if (!prompt || aiBusy || !current || !pendingCap) return;
  aiBusy = true;
  const cap = pendingCap;
  const btn = document.getElementById('ai-generate');
  const status = document.getElementById('ai-status');
  btn.disabled = true;
  const t0 = Date.now();
  const timer = setInterval(() =>
    status.textContent = '生成中 ' + Math.round((Date.now() - t0) / 1000) + 's…', 1000);
  try {
    const r = await fetch('/api/edit-view', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        folder: current.folder, prompt,
        model: document.getElementById('ai-model').value || undefined,
        ref: aiRef || undefined,
        image: cap.image,
      }),
    });
    const res = await r.json();
    if (!r.ok || res.error) throw new Error(res.error || 'HTTP ' + r.status);
    clearInterval(timer);

    status.textContent = '融合贴图中…';
    await new Promise(rs => setTimeout(rs, 30));  // 让状态先渲染出来
    const editedImg = await loadImageEl(res.image);
    const faceCanvases = await reprojectToFaces(cap, editedImg);
    if (!Object.keys(faceCanvases).length) throw new Error('编辑区域没有覆盖任何面');

    status.textContent = '保存中…';
    const facesData = {};
    for (const [face, canvas] of Object.entries(faceCanvases))
      facesData[face] = canvas.toDataURL('image/jpeg', 0.92);
    const r2 = await fetch('/api/edit-apply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        folder: current.folder, prompt,
        model: document.getElementById('ai-model').value || '',
        faces: facesData,
      }),
    });
    const res2 = await r2.json();
    if (!r2.ok || res2.error) throw new Error(res2.error || 'HTTP ' + r2.status);

    await refreshEditsAndFaces();
    document.getElementById('ai-prompt').value = '';
    status.textContent = '';
    toast('已应用编辑（覆盖 ' + res2.faces.length + ' 个面）');
  } catch (e) {
    status.textContent = '失败：' + e.message;
  } finally {
    clearInterval(timer);
    aiBusy = false;
    btn.disabled = false;
  }
});

/* 重投影自测（?viewtest&capyaw=45&yaw=100）：把捕捉画面染红贴回，验证几何对齐 */
async function viewTest() {
  const p = new URLSearchParams(location.search);
  const oy = yaw, op = pitch;
  yaw = (parseFloat(p.get('capyaw')) || 0) * Math.PI / 180;
  pitch = (parseFloat(p.get('cappitch')) || 0) * Math.PI / 180;
  updateCamera();
  captureView();
  yaw = oy; pitch = op;
  updateCamera();

  const img = await loadImageEl(pendingCap.image);
  const c = document.createElement('canvas');
  c.width = img.naturalWidth; c.height = img.naturalHeight;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);
  ctx.fillStyle = 'rgba(255,0,0,0.45)';
  ctx.fillRect(0, 0, c.width, c.height);
  const edited = await loadImageEl(c.toDataURL('image/jpeg', 0.9));
  const faces = await reprojectToFaces(pendingCap, edited);
  for (const [face, canvas] of Object.entries(faces)) {
    const i = FACE_DEFS.findIndex(fd => fd.face === face);
    const tex = new THREE.CanvasTexture(canvas);
    tex.colorSpace = THREE.SRGBColorSpace;
    const mat = currentGroup.children[i].material;
    mat.map?.dispose();
    mat.map = tex;
    mat.needsUpdate = true;
  }
  window.__viewtestDone = Object.keys(faces);
}

function closeDrawers(except) {
  ['ann-drawer', 'ai-panel'].forEach(id => {
    if (id !== except) document.getElementById(id).classList.remove('show');
  });
}
document.querySelectorAll('.drawer .close').forEach(b =>
  b.addEventListener('click', () => document.getElementById(b.dataset.close).classList.remove('show')));

/* ---------- 其他 UI ---------- */
document.getElementById('btn-fs').addEventListener('click', () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else document.documentElement.requestFullscreen?.();
});

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ---------- 初始化 ---------- */
async function init() {
  const data = await (await fetch('assets/scenes.json')).json();
  scenes = data.scenes;

  // 探测本地服务器：可用则开启批注编辑 / AI 改图
  try {
    const h = await (await fetch('/api/health')).json();
    serverMode = !!h.ok;
    aiMode = !!h.ai;
    const sel = document.getElementById('ai-model');
    (h.models || []).forEach(m => {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      sel.appendChild(opt);
    });
  } catch { /* 静态部署（GitHub Pages），只读模式 */ }
  if (serverMode) document.getElementById('btn-ann-add').style.display = 'flex';
  if (aiMode) document.getElementById('btn-ai').style.display = 'flex';

  try {
    annotations = await (await fetch('assets/annotations.json?t=' + Date.now())).json();
  } catch { annotations = {}; }
  try {
    edits = await (await fetch('assets/edits.json?t=' + Date.now())).json();
  } catch { edits = {}; }

  try {
    hotspots = await (await fetch('assets/hotspots.json')).json();
  } catch { hotspots = {}; }
  // 编辑模式下优先使用本地草稿
  if (editMode) {
    const draft = localStorage.getItem('hotspots-draft');
    if (draft) { try { hotspots = JSON.parse(draft); } catch {} }
  }

  // 缩略图栏
  const bar = document.getElementById('thumb-bar');
  const targetSel = document.getElementById('edit-target');
  scenes.forEach(s => {
    const el = document.createElement('div');
    el.className = 'thumb';
    el.dataset.folder = s.folder;
    el.innerHTML = '<img loading="lazy" src="assets/scenes/' + encodeURIComponent(s.folder) +
      '/thumb.jpg" alt=""><span>' + s.name + '</span>';
    el.addEventListener('click', () => gotoScene(s.folder));
    bar.appendChild(el);

    const opt = document.createElement('option');
    opt.value = s.folder;
    opt.textContent = s.name;
    targetSel.appendChild(opt);
  });

  // 支持 ?scene=文件夹&yaw=度&pitch=度 指定初始视角
  const params = new URLSearchParams(location.search);
  const startFolder = params.get('scene') && scenes.find(s => s.folder === params.get('scene'))
    ? params.get('scene') : scenes[0].folder;
  const opts = {};
  if (params.has('yaw')) {
    opts.yaw = THREE.MathUtils.degToRad(parseFloat(params.get('yaw')) || 0);
    opts.pitch = THREE.MathUtils.degToRad(parseFloat(params.get('pitch')) || 0);
  }
  await gotoScene(startFolder, opts);
  if (params.has('viewtest')) await viewTest();
  fadeEl.style.opacity = 0;
}

function animate() {
  requestAnimationFrame(animate);
  if (gyroOn && gyroData) {
    applyGyro();
  } else {
    // 惯性
    if (!dragging && (Math.abs(velYaw) > 0.00005 || Math.abs(velPitch) > 0.00005)) {
      yaw += velYaw; pitch += velPitch;
      pitch = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT, pitch));
      velYaw *= 0.94; velPitch *= 0.94;
    }
    updateCamera();
  }
  updateHotspotPositions();
  updateAnnPositions();
  renderer.render(scene, camera);
}

init();
animate();
</script>
